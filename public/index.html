<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SkyNode Solutions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Bem-Vindo ao SkyNode Solutions</h1>
    </header>
    <main id="dashboard">
        <section class="card">
            <h2>CPU</h2>
            <div class="display">
                <span id="valor-cpu">--</span>%
            </div>
            <p id="status-cpu">Status: Conectando...</p>
        </section>

        <section class="card">
            <h2>Memória</h2>
            <div class="display">
                <span id="valor-ram">--</span> GB
            </div>
            <p id="status-ram">Status: Conectando...</p>
        </section>

        <section class="card">
            <h2>Temperatura</h2>
            <div class="display">
                <span id="valor-temp">--</span> °C
            </div>
            <p id="status-temp">Status: Conectando...</p>
        </section>



    </main>
    <footer>
        <p>SkyNode Solutions &copy; 2026</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
